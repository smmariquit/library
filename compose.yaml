services:
  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AUTH_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:8000
      MAILPIT_URL: http://mailpit:8025
      WEB_URL: http://localhost:3000
    depends_on:
      auth:
        condition: service_started
      api:
        condition: service_started

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-library}:${POSTGRES_PASSWORD:-library}@postgres:5432/${POSTGRES_DB:-library}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio-local-password}
      JWT_JWKS_URL: http://auth:3001/api/auth/jwks
      JWT_ISSUER: http://localhost:3001
      JWT_AUDIENCE: http://localhost:3001
      AUTH_URL: http://auth:3001
      MAILPIT_URL: http://mailpit:8025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  auth:
    build: ./auth
    ports:
      - "3001:3001"
    environment:
      BETTER_AUTH_URL: http://localhost:3001
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-development-secret-change-me-123456}
      AUTH_DATABASE_URL: postgresql://${POSTGRES_USER:-library}:${POSTGRES_PASSWORD:-library}@postgres:5432/${POSTGRES_DB:-library}?options=-c%20search_path%3Dauth
      WEB_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: no-reply@library.local
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  postgres:
    image: docker.io/library/postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-library}
      POSTGRES_USER: ${POSTGRES_USER:-library}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-schemas.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: docker.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-password}
    volumes:
      - minio_data:/data

  mailpit:
    image: docker.io/axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  minio_data:
  postgres_data:
